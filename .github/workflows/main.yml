name: Main

on:
  schedule: # execute every 24 hours
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    name: generate

    steps:
      - uses: actions/checkout@v4
      - uses: vn7n24fzkq/github-profile-summary-cards@release
        env: # default use ${{ secrets.GITHUB_TOKEN }}, you can change to your personal access token
          GITHUB_TOKEN: ${{ secrets.PERSONAL_ACCESS_TOKEN }}
        with:
          USERNAME: ${{ github.repository_owner }}
          UTC_OFFSET: 9
          # Only generate the theme this README actually uses...
          THEME: zenburn
          # ...with a light opacity-only fade (cheapest to render — the heavier
          # presets like load/sequence stutter as <img>-embedded SVGs).
          ANIMATION: fade
          EXCLUDE: "HTML"
          AUTO_PUSH: true
          
